# Alembic Configuration File
# https://alembic.sqlalchemy.org/

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
# %%(rev)s is the revision id, %%(slug)s is a short description
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename. If specified, requires the python-dateutil library.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be detected
sourceless = false

# Version location specification; This defaults
# to alembic/versions. When using multiple version
# directories, initial revisions must be specified with --version-path.
version_locations = %(here)s/alembic/versions

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# ── Database URL ─────────────────────────────────────────────────────────────
# Overridden by env.py using NEXLINK_DATABASE_URL (sync psycopg2 driver for offline)
sqlalchemy.url = postgresql://nexlink:nexlink@localhost:5432/nexlink

[post_write_hooks]
# do nothing by default

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
