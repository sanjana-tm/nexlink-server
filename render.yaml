services:
  - type: web
    name: nexlink-server
    runtime: python
    region: singapore
    plan: free

    buildCommand: pip install -r requirements.txt

    # Render injects PORT; pass directly to uvicorn
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /health

    envVars:
      # Render provides DATABASE_URL from the linked database — we map it to NEXLINK_DATABASE_URL
      # The server auto-converts postgres:// → postgresql+asyncpg://
      - key: NEXLINK_DATABASE_URL
        fromDatabase:
          name: nexlink-db
          property: connectionString

      # Render auto-generates a cryptographically secure random value
      - key: NEXLINK_JWT_SECRET_KEY
        generateValue: true

      - key: NEXLINK_LOG_LEVEL
        value: INFO

      - key: NEXLINK_LOG_FORMAT
        value: json

      - key: NEXLINK_CORS_ORIGINS
        value: "*"

databases:
  - name: nexlink-db
    plan: free
    region: singapore
    databaseName: nexlink
    user: nexlink
